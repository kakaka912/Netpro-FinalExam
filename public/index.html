<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chat App</title>
        <link rel="stylesheet" href="./css/style.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </head>

    <body>

    <!--ログイン
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>ログイン</h2>
            <input id="usernameInput" type="text" placeholder="ユーザー名を入力" autocomplete="off">
            <button id="loginButton">ログイン</button>
        </div>
    </div>
    (K)-->

    <div class="container">

        <!--チャット画面-->
        <div class="chat">
            <ul class="messages"></ul>

            <!--選択肢-->
            <div class="choices" id="choices">
            </div>

            <form class="form">
                <input class="input" autocomplete="off" placeholder="メッセージを入力">
                <button type="submit" class="submit">Send</button>
            </form>
        </div>

        <!--オーバーレイ-->
        <button id="toggleOverlay" class="toggle-btn">
            <i class="bi bi-layout-sidebar-reverse"></i>
        </button>
        
        <aside class="overlay hidden" id="overlay">
            <div class="overlay-content">
            
                <!-- タブ -->
                <div class="tabs">
                    <button class="tab-btn active" id="memoTab">メモ</button>
                    <button class="tab-btn" id="settingTab">設定</button>
                </div>

                <!-- メモ画面 -->
                <div id="memoPanel" class="tab-panel">
                    <div class="panel">
                        <h3>テキストメモ</h3>

                        <textarea id="memo" placeholder="テキストメモ"></textarea>
                    </div>

                    <div class="panel">
                        <h3>手書きメモ</h3>
                        <div class="memo-toolbar">

                            <!-- 色 -->
                            <div class="color-tools">
                                <input type="color" id="penColor" value="#ffffff">
                            </div>

                            <!-- 太さ -->
                            <div class="width-tools">
                                <button class="width-btn" data-width="2">
                                    <span class="dot small"></span>
                                </button>

                                <button class="width-btn active" data-width="5">
                                    <span class="dot medium"></span>
                                </button>
                                
                                <button class="width-btn" data-width="8">
                                    <span class="dot large"></span>
                                </button>
                            </div>

                            <!-- ペン -->
                            <button id="penBtn">
                                <i class="bi bi-pencil-fill"></i>
                            </button>

                            <!-- 消しゴム -->
                            <button id="eraserBtn">
                                <i class="bi bi-eraser-fill"></i>
                            </button>

                            <!-- クリア -->
                            <button id="clearBtn">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </div>
                        
                        <canvas id="memoCanvas"></canvas>
                    </div>
                </div>

                <!-- 設定画面 -->
                <div id="settingPanel" class="tab-panel hidden">
                    <div class="panel">
                        <h3>文字サイズ</h3>
                        <select id="fontSize">
                            <option value="small">小</option>
                            <option value="medium" selected>標準</option>
                            <option value="large">大</option>
                        </select>
                    </div>
                    <div class="panel">
                        <h3>色覚補正モード</h3>
                        <select id="colorMode">
                            <option value="off">OFF</option>
                            <option value="protanopia">Protanopia</option>
                            <option value="deuteranopia">Deuteranopia</option>
                            <option value="tritanopia">Tritanopia</option>
                        </select>
                    </div>
                </div>
            
            </div>
        </aside>
    </div>

    <script src="./js/main.js"></script>
    </body>
</html>
