<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chat App</title>
        <link rel="stylesheet" href="./css/style.css">
    </head>

    <body>

    <!--ログイン-->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>ログイン</h2>
            <input id="usernameInput" type="text" placeholder="ユーザー名を入力" autocomplete="off">
            <button id="loginButton">ログイン</button>
        </div>
    </div>

    <div class="container">

        <!--チャット画面-->
        <div class="chat">
            <ul class="messages"></ul>

            <!--選択肢-->
            <div class="choices">
                <button class="choice">おはようございます。</button>
                <button class="choice">こんにちは。</button>
                <button class="choice">こんばんは。</button>
            </div>

            <form class="form">
                <input class="input" autocomplete="off" placeholder="メッセージを入力">
                <button class="submit">Send</button>
            </form>
        </div>

        <!--ゲーム内情報-->
        <aside class="overlay">
            <h2>ゲーム情報</h2>

            <div class="panel">
                <h3>ユーザー情報</h3>
                <ul id="userinfo">
                    <li>名前: ディス</li>
                    <li>Cランクの人間</li>
                    <li>勤務先: 総合指示施設</li>
                    <li>仕事内容: 画面上に指示されたボタンを押す</li>
                    <li>移動制限: 職場と自宅以外の移動には申請が必要</li>
                </ul>
            </div>

            <div class="panel">
                <h3>現在の状況</h3>
                <p id="status">
                    あなたは優秀な闇市の人を探しています。
                </p>
            </div>

            <div class="panel">
                <h3>持っている情報</h3>
                <ul id="itemList">
                    <li>「ピアがアンドロイド」</li>
                    <li>アンドロイドは処分対象である</li>
                </ul>
            </div>

            <div class="panel">
                <h3>現在のタスク</h3>
                <ul id="taskList">
                    <li>街を出る方法を探す</li>
                    <li>偽造申請許可証を闇市で手に入れる</li>
                </ul>
            </div>
        </aside>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="./js/main.js"></script>
    </body>
</html>
